name: Build & Deploy to GreenNode

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (leave empty for timestamp)"
        required: false

env:
  CR_REGISTRY: vcr.vngcloud.vn
  CR_REPO: vcr.vngcloud.vn/111480-abp111809/agentt
  RUNTIME_ID: runtime-f0277ef5-de09-454b-9110-da460117319c
  RUNTIME_FLAVOR: runtime-s2-general-2x4
  ENDPOINT: https://endpoint-3d03d4f6-c9fa-44e1-b07d-7ddcfee16bf4.agentbase-runtime.aiplatform.vngcloud.vn

jobs:
  build-push:
    name: Build & Push image
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to VNG Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CR_REGISTRY }}
          username: ${{ secrets.VCR_USERNAME }}
          password: ${{ secrets.VCR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.CR_REPO }}:${{ steps.tag.outputs.tag }}
          # Build cache via GH Actions cache backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Update GreenNode runtime
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - uses: actions/checkout@v4

      - name: Update runtime
        env:
          GREENNODE_CLIENT_ID: ${{ secrets.GREENNODE_CLIENT_ID }}
          GREENNODE_CLIENT_SECRET: ${{ secrets.GREENNODE_CLIENT_SECRET }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          GREENNODE_MEMORY_ID: ${{ secrets.GREENNODE_MEMORY_ID }}
        run: |
          set -euo pipefail
          TAG="${{ needs.build-push.outputs.tag }}"
          IMAGE="${{ env.CR_REPO }}:${TAG}"

          echo "Deploying image: $IMAGE"

          # Write env file for the runtime container
          cat > /tmp/runtime.env << EOF
          PORT=8080
          LLM_PROVIDER=${LLM_PROVIDER}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          OPENAI_BASE_URL=${OPENAI_BASE_URL}
          OPENAI_MODEL=${OPENAI_MODEL}
          GREENNODE_MEMORY_ID=${GREENNODE_MEMORY_ID}
          MOCK_DIR=./mock
          DIGEST_DB_PATH=./digests.db
          EOF

          bash .claude/skills/agentbase/scripts/runtime.sh update "${{ env.RUNTIME_ID }}" \
            --image "$IMAGE" \
            --flavor "${{ env.RUNTIME_FLAVOR }}" \
            --env-file /tmp/runtime.env \
            --from-cr

      - name: Health check
        timeout-minutes: 5
        run: |
          echo "Waiting for runtime to become healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ env.ENDPOINT }}/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Runtime is healthy."
              exit 0
            fi
            sleep 10
          done
          echo "Health check timed out after 5 minutes."
          exit 1

      - name: Post summary
        if: always()
        run: |
          TAG="${{ needs.build-push.outputs.tag }}"
          echo "## Deploy summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.CR_REPO }}:${TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Runtime | \`${{ env.RUNTIME_ID }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Endpoint | ${{ env.ENDPOINT }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
